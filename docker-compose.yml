services:
  mysql:
    image: mysql:8.0
    container_name: trade-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: trade_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    container_name: trade-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    container_name: trade-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "neo4j/neo4jneo4j"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - neo4j
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trade-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      # 如需 HTTPS：取消注释并配置证书挂载（见 docs 教程）
      # - "443:443"
    # volumes:
    #   - ./frontend/certs:/etc/nginx/certs:ro

volumes:
  mysql_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
