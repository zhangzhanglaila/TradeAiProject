server:
  port: 8080

spring:
  application:
    name: trade-data-system

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/trade_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 43g3hqweg43q

  redis:
    host: redis
    port: 6379
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  neo4j:
    uri: bolt://neo4j:7687
    authentication:
      username: neo4j
      password: neo4jneo4j

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.trade.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: trade-data-system-secret-key-2025-very-long-secret
  expiration: 86400000

knife4j:
  enable: true
  setting:
    language: zh-CN

# 是否启用 Spring Security 鉴权（本地联调可关闭）
app:
  security:
    enabled: true
  captcha:
    fail-threshold: 3
    fail-ttl-minutes: 30
  ai:
    enabled: true
    api-key: sk-64ca81fa96054dc9846dea750037d585
    model-name: qwen3-max
    embedding-model-name: text-embedding-v3
    news-chunk-size: 600
    news-chunk-overlap: 80
    news-rag-candidate-limit: 2000
